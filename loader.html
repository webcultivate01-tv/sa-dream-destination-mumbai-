<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader-container {
      text-align: center;
    }

    .airplane {
      font-size: 80px;
      animation: fly 2s ease-in-out infinite;
      display: inline-block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    @keyframes fly {
      0%, 100% {
        transform: translateY(0) rotate(-5deg);
      }
      50% {
        transform: translateY(-30px) rotate(5deg);
      }
    }

    .clouds {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -1;
    }

    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 100px;
      animation: moveCloud linear infinite;
    }

    .cloud:before,
    .cloud:after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 100px;
    }

    .cloud1 {
      width: 100px;
      height: 40px;
      top: 20%;
      animation-duration: 20s;
    }

    .cloud1:before {
      width: 50px;
      height: 50px;
      top: -25px;
      left: 10px;
    }

    .cloud1:after {
      width: 60px;
      height: 40px;
      top: -15px;
      right: 10px;
    }

    .cloud2 {
      width: 120px;
      height: 50px;
      top: 60%;
      animation-duration: 25s;
      animation-delay: -5s;
    }

    .cloud2:before {
      width: 60px;
      height: 60px;
      top: -30px;
      left: 15px;
    }

    .cloud2:after {
      width: 70px;
      height: 50px;
      top: -20px;
      right: 15px;
    }

    .cloud3 {
      width: 80px;
      height: 35px;
      top: 40%;
      animation-duration: 18s;
      animation-delay: -10s;
    }

    .cloud3:before {
      width: 40px;
      height: 40px;
      top: -20px;
      left: 8px;
    }

    .cloud3:after {
      width: 50px;
      height: 35px;
      top: -12px;
      right: 8px;
    }

    @keyframes moveCloud {
      0% {
        left: -150px;
      }
      100% {
        left: 110%;
      }
    }

    .loading-text {
      color: white;
      font-size: 24px;
      font-weight: bold;
      margin-top: 30px;
      letter-spacing: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .dots {
      display: inline-block;
      width: 60px;
      text-align: left;
    }

    .dot {
      animation: blink 1.4s infinite;
      opacity: 0;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%, 20% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    .progress-bar {
      width: 300px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      margin: 30px auto 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B35, #FFD166);
      border-radius: 10px;
      animation: loading 3s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        width: 0%;
      }
      50% {
        width: 70%;
      }
      100% {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="clouds">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
  </div>

  <div class="loader-container">
    <div class="airplane">✈️</div>
    <div class="loading-text">
      Loading<span class="dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script>
    // Redirect to index.html after 3 seconds
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 3000);
  </script>
</body>
</html>
